<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تم الإرسال بنجاح - د/ أحمد أبو رواش</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .thank-you-wrapper {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .thank-you-card {
            background: var(--bg-card);
            backdrop-filter: blur(30px);
            padding: 4rem;
            border-radius: var(--radius-xl);
            border: 1px solid var(--border-purple);
            box-shadow: var(--shadow-glow);
            max-width: 600px;
            width: 100%;
        }

        .success-icon {
            width: 100px;
            height: 100px;
            background: var(--gradient-purple);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #fff;
            margin: 0 auto 2rem;
            box-shadow: 0 0 30px var(--primary-purple);
        }

        .thank-you-card h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: #fff;
        }

        .thank-you-card p {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .redirect-timer {
            font-size: 0.9rem;
            color: var(--secondary-purple);
            font-weight: 700;
        }

        .progress-bar-container {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            margin-top: 2rem;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--gradient-purple);
            width: 0%;
            transition: width 5s linear;
        }
    </style>
</head>

<body>
    <div class="thank-you-wrapper">
        <div class="thank-you-card">
            <div class="success-icon">
                <i class="fas fa-check"></i>
            </div>
            <h1>شكراً لكِ!</h1>
            <p>تم استلام رسالتك بنجاح. سيقوم فريقنا بالتواصل معكِ في أقرب وقت ممكن.</p>
            <div class="redirect-timer">
                سيتم تحويلك إلى الصفحة الرئيسية خلال <span id="seconds">5</span> ثوانٍ...
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar-fill" id="progress"></div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const progress = document.getElementById('progress');
            const secondsSpan = document.getElementById('seconds');
            let timeLeft = 5;

            // Start progress animation
            setTimeout(() => {
                progress.style.width = '100%';
            }, 100);

            // Countdown timer
            const timer = setInterval(() => {
                timeLeft--;
                secondsSpan.textContent = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    window.location.href = 'index.html';
                }
            }, 1000);
        });
    </script>
</body>

</html>
